<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Absen</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08060d;--c1:#100e18;--c2:#181422;--c3:#22202e;--c4:#2c293c;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --vi:#7c3aed;--vi1:rgba(124,58,237,.16);--vi2:rgba(124,58,237,.08);
  --tx:#ece8f4;--t2:#9080a8;--t3:#4e4468;
  --gr:#16a34a;--gr1:rgba(22,163,74,.16);
  --am:#d97706;--am1:rgba(217,119,6,.16);
  --rd:#dc2626;--rd1:rgba(220,38,38,.16);
  --bl:#2563eb;--bl1:rgba(37,99,235,.16);
  --r1:10px;--r2:18px;--r3:26px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:400px;margin:0 auto;padding:1.5rem 1.25rem 5rem}

#boot{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--t2);font-size:13px}
.spin{width:24px;height:24px;border:2px solid var(--bd2);border-top-color:var(--vi);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#main{display:none}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.brand{font-size:11px;font-weight:700;color:var(--vi);letter-spacing:.12em;text-transform:uppercase}
.tc{background:var(--c2);border:1px solid var(--bd);border-radius:99px;padding:5px 13px;font-size:13px;font-weight:600}

.clk-box{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r3);padding:1.5rem;text-align:center;margin-bottom:1.25rem}
.clk-big{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1}
.clk-date{font-size:12px;color:var(--t2);margin-top:5px}

.sec{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin:0 0 8px}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1.25rem}
.eb{padding:12px 8px;background:var(--c2);border:1px solid var(--bd);border-radius:var(--r1);cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.eb:hover{border-color:var(--vi)}.eb.sel{background:var(--vi1);border-color:var(--vi)}
.ea{width:36px;height:36px;border-radius:50%;background:var(--t3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto 6px;transition:background .15s}
.eb.sel .ea{background:var(--vi)}
.en{font-size:12px;font-weight:600}.er{font-size:10px;color:var(--t2);margin-top:1px}
.ed{width:6px;height:6px;border-radius:50%;background:var(--t3);margin:5px auto 0;transition:background .15s}
.ed.on{background:var(--gr)}

.sc{display:none;margin-bottom:1.25rem}.sc.vis{display:block}
.card-ci{background:var(--gr1);border:1px solid rgba(22,163,74,.28);border-radius:var(--r3);padding:1.5rem;text-align:center}
.card-co{background:var(--vi1);border:1px solid rgba(124,58,237,.28);border-radius:var(--r3);padding:1.5rem;text-align:center}
.card-lv{background:var(--bl1);border:1px solid rgba(37,99,235,.28);border-radius:var(--r3);padding:1.5rem;text-align:center}
.card-dn{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r3);padding:2rem;text-align:center;display:none;margin-bottom:1.25rem}
.card-dn.vis{display:block}
.si{font-size:30px;margin-bottom:7px}.st{font-size:17px;font-weight:700;margin-bottom:3px}
.ss{font-size:12px;color:var(--t2);margin-bottom:1.1rem}
.ci-t{font-size:38px;font-weight:800;color:var(--gr);letter-spacing:-1px;margin-bottom:3px}
.dur{font-size:13px;color:var(--t2);margin-bottom:1.1rem}
.dn-h{font-size:42px;font-weight:800;color:var(--gr);margin:.5rem 0 .2rem;letter-spacing:-2px}
.dn-ot{font-size:12px;color:var(--am);margin-top:3px}

.ab{width:100%;padding:15px;border:none;border-radius:var(--r2);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.ab:active{transform:scale(.98)}.ab:disabled{opacity:.45;cursor:not-allowed}
.ab-ci{background:var(--gr);color:#fff}.ab-co{background:var(--vi);color:#fff}
.loc{font-size:11px;color:var(--t3);text-align:center;margin-top:6px;min-height:16px;transition:color .2s}
.loc.ok{color:var(--gr)}.loc.er{color:var(--rd)}.loc.wn{color:var(--am)}

.notice{background:var(--c3);border:1px solid var(--bd2);border-radius:var(--r1);padding:9px 13px;font-size:12px;color:var(--t2);text-align:center;display:none;margin-bottom:1rem}
.notice.vis{display:block}
.dv{display:flex;align-items:center;gap:8px;margin:1.1rem 0}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--bd)}
.dv span{font-size:11px;color:var(--t3)}
.lvbox{background:var(--c2);border:1px solid var(--bd);border-radius:var(--r3);padding:1.1rem}
.lv-btns{display:flex;gap:7px;margin-bottom:9px}
.lvb{flex:1;padding:9px 4px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--c3);color:var(--t2);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center;transition:all .15s}
.lvb.a-iz{background:var(--am1);border-color:var(--am);color:var(--am)}
.lvb.a-sk{background:var(--rd1);border-color:var(--rd);color:var(--rd)}
.lvb.a-lb{background:var(--bl1);border-color:var(--bl);color:var(--bl)}
.lv-ta{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r1);font-size:13px;font-family:inherit;color:var(--tx);outline:none;resize:none;min-height:55px;margin-bottom:9px;color-scheme:dark;transition:border-color .15s}
.lv-ta:focus{border-color:var(--am)}
.lv-sub{width:100%;padding:11px;background:var(--am);color:#1a1a1a;border:none;border-radius:var(--r1);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.lv-sub:disabled{opacity:.4;cursor:not-allowed}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:var(--r1);font-size:13px;font-weight:600;font-family:inherit;display:none;z-index:999;text-align:center;min-width:200px;max-width:300px}
.toast.vis{display:block}.toast.ok{background:var(--gr);color:#fff}
.toast.er{background:var(--rd);color:#fff}.toast.wn{background:var(--am);color:#111}
</style>
</head>
<body>
<div id="boot"><div class="spin"></div><span>Memuat…</span></div>
<div id="main">
<div class="wrap">
  <div class="topbar">
    <div class="brand">Absen</div>
    <div class="tc" id="tc">--:--</div>
  </div>
  <div class="clk-box">
    <div class="clk-big" id="clk">--:--</div>
    <div class="clk-date" id="cld">--</div>
  </div>
  <div class="sec">Pilih namamu</div>
  <div class="eg" id="eg"></div>
  <div class="notice" id="notice"></div>
  <div class="sc" id="sc"></div>
  <div class="card-dn" id="cdn">
    <div class="si">🎉</div>
    <div class="st">Selesai hari ini!</div>
    <div class="dn-h" id="dn-h">0 jam</div>
    <div class="dn-ot" id="dn-ot"></div>
    <div class="ss" id="dn-s"></div>
  </div>
  <div class="dv" id="dv" style="display:none"><span>tidak masuk hari ini?</span></div>
  <div class="lvbox" id="lvbox" style="display:none">
    <div class="sec" style="margin-bottom:9px">Catat ketidakhadiran</div>
    <div class="lv-btns">
      <div class="lvb" id="lb-iz" onclick="selLv('izin')">🙏 Izin</div>
      <div class="lvb" id="lb-sk" onclick="selLv('sakit')">🤒 Sakit</div>
      <div class="lvb" id="lb-lb" onclick="selLv('libur')">🏖 Libur</div>
    </div>
    <textarea class="lv-ta" id="lv-ta" placeholder="Keterangan (opsional)"></textarea>
    <button class="lv-sub" id="lv-sub" onclick="submitLv()" disabled>Kirim</button>
  </div>
</div>
</div>
<div class="toast" id="tst"></div>
<script>
const API='/api';
const O_LAT=-7.812676,O_LNG=112.0672845,RADIUS=100;
let emps=[],roles=[],selEmp=null,selLvType=null;
const $=id=>document.getElementById(id);
const p2=n=>String(n).padStart(2,'0');
const fmtT=()=>{const d=new Date();return p2(d.getHours())+':'+p2(d.getMinutes());};
const todayS=()=>{const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;};
const monNow=()=>todayS().slice(0,7);
const ini=n=>(n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const calcH=(a,b)=>{const[ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number);const d=(bh*60+bm)-(ah*60+am);return d>0?Math.round(d/60*100)/100:0;};
const sk=id=>`att_${id}_${todayS()}`;
const gLS=id=>{try{return JSON.parse(localStorage.getItem(sk(id)))||null}catch{return null}};
const sLS=(id,v)=>localStorage.setItem(sk(id),JSON.stringify(v));
function toast(m,t='ok'){const el=$('tst');el.textContent=m;el.className='toast vis '+t;setTimeout(()=>el.className='toast',3200);}

function tick(){
  const d=new Date();const t=p2(d.getHours())+':'+p2(d.getMinutes());
  $('clk').textContent=t;$('tc').textContent=t;
  $('cld').textContent=d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if(selEmp){const s=gLS(selEmp.id);if(s?.status==='in'){const el=$('dur');if(el){const m=Math.floor((Date.now()-s.ts)/60000);el.textContent=m>=60?`${Math.floor(m/60)}j ${m%60}m`:`${m} menit`;}}}
}
setInterval(tick,1000);tick();

async function boot(){
  try{
    const[er,rr]=await Promise.all([fetch(API+'?a=employees').then(r=>r.json()),fetch(API+'?a=roles').then(r=>r.json())]);
    emps=(er.data||[]).filter(e=>e.active!==false&&String(e.active)!=='FALSE');
    roles=rr.data||[];
  }catch{emps=[];roles=[];}
  $('boot').style.display='none';$('main').style.display='block';
  renderGrid();
}

function renderGrid(){
  const g=$('eg');
  if(!emps.length){g.innerHTML='<div style="grid-column:span 2;text-align:center;color:var(--t2);padding:2rem;font-size:13px;">Belum ada karyawan. Hubungi admin.</div>';return;}
  g.innerHTML=emps.map(e=>{
    const s=gLS(e.id);const on=s?.status==='in';
    const r=roles.find(x=>x.id===e.role_id);
    return `<div class="eb" id="eb-${e.id}" onclick="pickEmp('${e.id}')">
      <div class="ea">${ini(e.name)}</div>
      <div class="en">${e.name}</div>
      <div class="er">${r?r.name:''}</div>
      <div class="ed ${on?'on':''}" id="ed-${e.id}"></div>
    </div>`;
  }).join('');
}

async function pickEmp(id){
  selEmp=emps.find(e=>e.id===id);selLvType=null;
  document.querySelectorAll('.eb').forEach(b=>b.classList.remove('sel'));
  $('eb-'+id)?.classList.add('sel');
  resetLvUI();await renderState();
}

async function renderState(){
  const emp=selEmp;if(!emp)return;
  const sc=$('sc'),cdn=$('cdn'),nt=$('notice');
  sc.className='sc';sc.innerHTML='';cdn.className='card-dn';
  nt.className='notice';nt.textContent='';
  $('dv').style.display='none';$('lvbox').style.display='none';
  let s=gLS(emp.id);
  if(!s){
    try{
      const res=await fetch(`${API}?a=attendance&month=${monNow()}&eid=${emp.id}`).then(r=>r.json());
      const rec=(res.data||[]).find(a=>a.date===todayS());
      if(rec){
        if(rec.check_in&&!rec.check_out){sLS(emp.id,{status:'in',time:rec.check_in,ts:Date.now()});s=gLS(emp.id);}
        else if(rec.check_in&&rec.check_out){const role=roles.find(r=>r.id===emp.role_id)||{};const ot=Math.max(0,calcH(rec.check_in,rec.check_out)-(Number(role.std_hours)||8));sLS(emp.id,{status:'out',tIn:rec.check_in,tOut:rec.check_out,h:rec.total_hours,ot});s=gLS(emp.id);}
      }
    }catch{}
  }
  if(!s){
    sc.innerHTML=`<div class="card-ci"><div class="si">👋</div><div class="st">Belum check-in</div><div class="ss">Lokasi dicek saat tombol ditekan</div><button class="ab ab-ci" id="ci-btn" onclick="doCI()">CHECK IN</button><div class="loc" id="ci-loc"></div></div>`;
    sc.classList.add('vis');$('dv').style.display='flex';$('lvbox').style.display='block';
  } else if(s.status==='in'){
    sc.innerHTML=`<div class="card-co"><div class="si">⏳</div><div class="st">Sedang bekerja</div><div class="ss">Check-in pukul</div><div class="ci-t">${s.time}</div><div class="dur" id="dur">menghitung…</div><button class="ab ab-co" id="co-btn" onclick="doCO()">CHECK OUT</button><div class="loc" id="co-loc"></div></div>`;
    sc.classList.add('vis');
  } else if(s.status==='out'){
    cdn.classList.add('vis');
    $('dn-h').textContent=(s.h||0)+' jam';
    $('dn-ot').textContent=s.ot>0?`Lembur hari ini: ${s.ot} jam`:'';
    $('dn-s').textContent=`Masuk ${s.tIn} · Keluar ${s.tOut}`;
    nt.textContent='Sudah check-out. Sampai jumpa besok! 👋';nt.classList.add('vis');
  } else if(s.status==='leave'){
    sc.innerHTML=`<div class="card-lv"><div class="si">📋</div><div class="st">Tercatat: ${s.type}</div><div class="ss">${s.notes||'—'}</div></div>`;
    sc.classList.add('vis');
  }
}

function haversine(la1,lo1,la2,lo2){const R=6371e3,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function getLoc(){return new Promise(res=>{if(!navigator.geolocation){res({ok:true,warn:true,note:'GPS tidak tersedia',latLng:'no-gps'});return;}navigator.geolocation.getCurrentPosition(p=>{const d=haversine(p.coords.latitude,p.coords.longitude,O_LAT,O_LNG);const acc=Math.round(p.coords.accuracy);res({ok:d<=RADIUS+acc,dist:Math.round(d),acc,latLng:`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`});},()=>res({ok:true,warn:true,note:'GPS error',latLng:'gps-err'}),{enableHighAccuracy:true,timeout:8000,maximumAge:0});})}

async function checkLoc(nid){const el=$(nid);if(!el)return null;el.textContent='Mengecek lokasi…';el.className='loc';const r=await getLoc();if(r.warn){el.textContent=r.note||'Tanpa verifikasi';el.className='loc wn';}else if(r.ok){el.textContent=`✓ ${r.dist}m dari kantor`;el.className='loc ok';}else{el.textContent=`✗ ${r.dist}m — terlalu jauh (max ${RADIUS}m)`;el.className='loc er';}return r;}

async function doCI(){
  const btn=$('ci-btn');if(!btn||!selEmp)return;
  btn.disabled=true;btn.textContent='Verifikasi…';
  const loc=await checkLoc('ci-loc');
  if(!loc.ok&&!loc.warn){btn.disabled=false;btn.textContent='CHECK IN';toast(`${loc.dist}m dari kantor`,'er');return;}
  btn.textContent='Menyimpan…';const t=fmtT();
  try{await post({action:'checkIn',employee_id:selEmp.id,time:t,lat_lng:loc.latLng});sLS(selEmp.id,{status:'in',time:t,ts:Date.now()});$('ed-'+selEmp.id)?.classList.add('on');toast('Check-in! '+t,'ok');renderState();}
  catch(e){toast(e.message||'Gagal','er');btn.disabled=false;btn.textContent='CHECK IN';}
}
async function doCO(){
  const btn=$('co-btn');if(!btn||!selEmp)return;
  btn.disabled=true;btn.textContent='Verifikasi…';
  const loc=await checkLoc('co-loc');
  if(!loc.ok&&!loc.warn){btn.disabled=false;btn.textContent='CHECK OUT';toast(`${loc.dist}m dari kantor`,'er');return;}
  btn.textContent='Menyimpan…';const t=fmtT();
  try{const res=await post({action:'checkOut',employee_id:selEmp.id,time:t,lat_lng:loc.latLng});const s=gLS(selEmp.id)||{};const h=res.data?.hours||0,ot=res.data?.ot||0;sLS(selEmp.id,{status:'out',tIn:s.time,tOut:t,h,ot});$('ed-'+selEmp.id)?.classList.remove('on');toast(`Check-out! ${h}j${ot>0?' (+'+ot+'j OT)':''}`,'ok');renderState();}
  catch(e){toast(e.message||'Gagal','er');btn.disabled=false;btn.textContent='CHECK OUT';}
}
function selLv(t){selLvType=t;[{k:'iz',v:'izin'},{k:'sk',v:'sakit'},{k:'lb',v:'libur'}].forEach(({k,v})=>{const el=$('lb-'+k);if(el)el.className='lvb'+(t===v?` a-${k}`:'');});$('lv-sub').disabled=false;}
async function submitLv(){
  if(!selEmp||!selLvType)return;const notes=$('lv-ta').value.trim();
  $('lv-sub').disabled=true;$('lv-sub').textContent='Menyimpan…';
  try{await post({action:'upsertLeave',row:{employee_id:selEmp.id,date:todayS(),month:monNow(),leave_type:selLvType,notes,approved_by:'self',created_at:''}});sLS(selEmp.id,{status:'leave',type:selLvType,notes});toast(selLvType+' tercatat','ok');setTimeout(renderState,500);}
  catch(e){toast(e.message||'Gagal','er');$('lv-sub').disabled=false;$('lv-sub').textContent='Kirim';}
}
function resetLvUI(){selLvType=null;['iz','sk','lb'].forEach(k=>{const el=$('lb-'+k);if(el)el.className='lvb';});const ta=$('lv-ta');if(ta)ta.value='';const sub=$('lv-sub');if(sub){sub.disabled=true;sub.textContent='Kirim';}}
async function post(p){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});const j=await r.json();if(!j.ok)throw new Error(j.error||'Error');return j;}
boot();
</script>
</body>
</html>
